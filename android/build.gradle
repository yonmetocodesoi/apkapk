buildscript {
    ext {
        buildToolsVersion = "33.0.0"
        minSdkVersion = 21
        compileSdkVersion = 33
        targetSdkVersion = 33
        ndkVersion = "23.1.7779620"
    }
    repositories {
        google()
        mavenCentral()
        maven { url "../node_modules/react-native/android" }
        maven { url "../node_modules/@react-native/gradle-plugin/android" }
    }
    dependencies {
        classpath("com.android.tools.build:gradle:7.4.2")
        classpath("com.facebook.react:react-native-gradle-plugin:0.71.17")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url "../node_modules/react-native/android" }
        maven { url "../node_modules/@react-native/gradle-plugin/android" }
    }
}
